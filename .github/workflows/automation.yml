name: AI365 content automation

# Runs the content agents on a schedule by calling each agent's API endpoint
# individually (one short request each), which keeps every call within the
# serverless time limit. Requires two repo secrets:
#   SITE_URL           e.g. https://ai365-mvp-plattform.vercel.app
#   AUTOMATION_SECRET  same value as in the app env

on:
  schedule:
    - cron: "0 6 * * *" # daily   06:00 UTC
    - cron: "0 5 * * 1" # weekly  Monday 05:00 UTC
    - cron: "0 4 1 * *" # monthly 1st 04:00 UTC
  workflow_dispatch:
    inputs:
      cadence:
        description: "Which cadence to run"
        required: true
        default: daily
        type: choice
        options: [daily, weekly, monthly]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run content agents
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SECRET: ${{ secrets.AUTOMATION_SECRET }}
        run: |
          CADENCE="${{ github.event.inputs.cadence }}"
          if [ -z "$CADENCE" ]; then
            case "${{ github.event.schedule }}" in
              "0 6 * * *") CADENCE=daily ;;
              "0 5 * * 1") CADENCE=weekly ;;
              "0 4 1 * *") CADENCE=monthly ;;
              *) CADENCE=daily ;;
            esac
          fi

          case "$CADENCE" in
            daily)   AGENTS="content comment community image analytics" ;;
            weekly)  AGENTS="article content comment community mvp github-scripts analytics" ;;
            monthly) AGENTS="personal-brand mvp analytics" ;;
            *)       AGENTS="analytics" ;;
          esac

          if [ -z "$SITE_URL" ] || [ -z "$SECRET" ]; then
            echo "Missing SITE_URL or AUTOMATION_SECRET repo secret"; exit 1
          fi

          echo "Cadence: $CADENCE"
          echo "Agents:  $AGENTS"
          fail=0
          for a in $AGENTS; do
            echo "::group::agent: $a"
            code=$(curl -sS -o /tmp/out.json -w "%{http_code}" --max-time 300 \
              -X POST -H "Authorization: Bearer $SECRET" \
              "$SITE_URL/api/agents/$a" || echo "000")
            echo "HTTP $code"
            cat /tmp/out.json 2>/dev/null || true
            echo
            if [ "$code" != "200" ]; then fail=1; fi
            echo "::endgroup::"
          done
          if [ "$fail" = "1" ]; then
            echo "One or more agents did not return 200 (often: Anthropic credits)."
          fi
